server {
    listen       80;
    server_name  localhost;
    root   /usr/share/nginx/html;
    index  index.html;

    # Placeholder replaced at container start (web/docker-entrypoint.sh + SPA_TIER env). Inspect with: curl -sSI https://app…/ | grep -i X-Claiset
    add_header X-Claiset-SPA-Tier "__SPA_TIER__" always;

    # SPA: direct loads of /closet, /stats, etc. must serve index.html (default nginx returns 404 → "no styling").
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
