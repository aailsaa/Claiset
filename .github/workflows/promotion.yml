name: Promotion (dev → qa → uat → prod)

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  # Merge to default branch (squash merge or merge commit): promote to UAT without RC in tip message.
  # Fork PR merges are skipped (`head.repo`) so workflows keep access to Actions secrets safely.
  pull_request:
    types:
      - closed
    branches:
      - main
  schedule:
    # Nightly QA promotion (UTC). Adjust as needed.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Environment to deploy (dev|qa|uat|prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - uat
          - prod

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  # ECR_REGISTRY is set per job after AWS credentials (see "Set ECR registry from AWS account").
  # Opt into Node.js 24 for JavaScript-based actions (GitHub runner deprecation notice).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
  TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
  # Passed to Terraform as var.route53_hosted_zone_id (see infra/envs/*/variables.tf).
  TF_VAR_route53_hosted_zone_id: ${{ secrets.ROUTE53_HOSTED_ZONE_ID }}
  # Self-hosted Grafana/Prometheus/Loki (all env Terraform jobs inherit these).
  # Repository variable ENABLE_OBSERVABILITY = true to turn on; requires secrets below.
  TF_VAR_enable_observability_stack: ${{ vars.ENABLE_OBSERVABILITY == 'true' && 'true' || 'false' }}
  TF_VAR_grafana_google_client_id: ${{ secrets.GRAFANA_GOOGLE_CLIENT_ID }}
  TF_VAR_grafana_google_client_secret: ${{ secrets.GRAFANA_GOOGLE_CLIENT_SECRET }}
  TF_VAR_grafana_google_allowed_domains: ${{ vars.GRAFANA_GOOGLE_ALLOWED_DOMAINS }}
  # Single canonical ECR namespace (provisioned in infra/envs/dev; qa+ reference URLs only).
  ECR_ITEMS_REPO: claiset-items
  ECR_OUTFITS_REPO: claiset-outfits
  ECR_SCHEDULE_REPO: claiset-schedule
  ECR_WEB_REPO: claiset-web
  ECR_MIGRATE_REPO: claiset-migrate

jobs:
  dev:
    name: Build + deploy dev
    env:
      # Must match infra/envs/dev defaults: project claiset + env dev (VPC/EKS Name tag).
      EXPECTED_VPC_NAME: claiset-dev
      EXPECTED_CLUSTER_NAME: claiset-dev
    runs-on: ubuntu-latest
    concurrency:
      group: tf-dev-${{ github.repository }}
      cancel-in-progress: false
    # Push to main runs dev unless the tip commit subject/body contains [skip-dev] (e.g. QA-only infra tweaks).
    # Manual dispatch with target dev always runs. Nightly QA does not use this job.
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main' && !(github.event.head_commit != null && contains(github.event.head_commit.message, '[skip-dev]'))) || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'dev')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Observability OAuth preflight (dev)
        run: |
          set -euo pipefail
          if [[ "${TF_VAR_enable_observability_stack:-false}" == "true" ]]; then
            id_trimmed="$(printf '%s' "${TF_VAR_grafana_google_client_id:-}" | tr -d '[:space:]')"
            secret_trimmed="$(printf '%s' "${TF_VAR_grafana_google_client_secret:-}" | tr -d '[:space:]')"
            if [[ -z "${id_trimmed}" || -z "${secret_trimmed}" ]]; then
              echo "Observability enabled but Grafana Google OAuth secrets are empty." >&2
              echo "Set repository secrets GRAFANA_GOOGLE_CLIENT_ID and GRAFANA_GOOGLE_CLIENT_SECRET." >&2
              exit 1
            fi
            echo "::add-mask::${TF_VAR_grafana_google_client_secret}"
            echo "Observability OAuth preflight OK (dev)."
          else
            echo "Observability disabled; skipping OAuth preflight."
          fi

      - name: Set ECR registry from AWS account
        run: |
          acct="$(aws sts get-caller-identity --query Account --output text)"
          echo "ECR_REGISTRY=${acct}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "${GITHUB_ENV}"
          echo "Using ECR registry ${acct}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

      - name: Ensure ECR repositories exist
        run: |
          set -euo pipefail
          repos=(
            "${ECR_ITEMS_REPO}"
            "${ECR_OUTFITS_REPO}"
            "${ECR_SCHEDULE_REPO}"
            "${ECR_MIGRATE_REPO}"
            "${ECR_WEB_REPO}"
          )
          for repo in "${repos[@]}"; do
            if ! aws ecr describe-repositories --repository-names "${repo}" >/dev/null 2>&1; then
              echo "Creating missing ECR repository: ${repo}"
              aws ecr create-repository --repository-name "${repo}" >/dev/null
            fi
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: "Build + push images (tag: dev)"
        run: |
          set -euo pipefail
          docker buildx build --platform linux/amd64 -f cmd/items-service/Dockerfile   -t "${ECR_REGISTRY}/${ECR_ITEMS_REPO}:dev"   --push .
          docker buildx build --platform linux/amd64 -f cmd/outfits-service/Dockerfile -t "${ECR_REGISTRY}/${ECR_OUTFITS_REPO}:dev" --push .
          docker buildx build --platform linux/amd64 -f cmd/schedule-service/Dockerfile -t "${ECR_REGISTRY}/${ECR_SCHEDULE_REPO}:dev" --push .
          docker buildx build --platform linux/amd64 -f cmd/migrate/Dockerfile        -t "${ECR_REGISTRY}/${ECR_MIGRATE_REPO}:dev" --push .
          docker buildx build --platform linux/amd64 -f web/Dockerfile                -t "${ECR_REGISTRY}/${ECR_WEB_REPO}:dev"     --push .

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/envs/dev
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=envs/dev/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: VPC duplicate guard
        working-directory: infra/envs/dev
        run: bash ../../scripts/terraform-vpc-guard.sh

      - name: EKS import guard
        working-directory: infra/envs/dev
        run: bash ../../scripts/terraform-eks-import-guard.sh

      - name: ECR import guard
        working-directory: infra/envs/dev
        run: bash ../../scripts/terraform-ecr-import-guard.sh

      - name: ECR state reconcile
        working-directory: infra/envs/dev
        run: |
          set -euo pipefail
          repos=(items outfits schedule web migrate)
          for suffix in "${repos[@]}"; do
            repo="claiset-${suffix}"
            addr="module.ecr.aws_ecr_repository.this[\"${suffix}\"]"
            if aws ecr describe-repositories --region "${AWS_REGION}" --repository-names "${repo}" >/dev/null 2>&1; then
              if terraform state show -no-color "${addr}" >/dev/null 2>&1; then
                echo "${repo} already in terraform state"
              else
                echo "Importing ${repo} into terraform state"
                terraform import "${addr}" "${repo}"
              fi
            fi
          done

      # Switching to route53_hosted_zone_id drops aws_route53_zone from config; Terraform would
      # otherwise try DeleteHostedZone on the old duplicate — fails while ACM/other records exist.
      # Stop managing it in state; delete the duplicate zone in AWS console later if needed.
      - name: Route53 state rm (external hosted zone secret)
        working-directory: infra/envs/dev
        run: |
          set -euo pipefail
          if [[ -n "${TF_VAR_route53_hosted_zone_id:-}" ]]; then
            terraform state rm 'module.platform.aws_route53_zone.this[0]' 2>/dev/null || true
          fi

      - name: Terraform apply
        working-directory: infra/envs/dev
        run: |
          # Phase 1: base AWS only (no platform/ACM/Helm) so a bad DNS/ACM run does not
          # half-apply Helm or leave -target state inconsistent with AWS.
          terraform apply -auto-approve \
            -target=module.network \
            -target=module.eks \
            -target=module.rds \
            -target=module.ecr

          # Burst node capacity for Phase 2 rollout, then scale down again for cost.
          # This prevents "Too many pods" from stalling Deployments on tiny nodes.
          BASE_MIN=2
          BASE_DESIRED=3
          BASE_MAX=6
          BURST_DESIRED=5
          CLUSTER="${EXPECTED_CLUSTER_NAME}"
          NODEGROUP="${EXPECTED_CLUSTER_NAME}-default"
          trap 'echo "Scaling nodegroup back down"; AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" "${BASE_MIN}" "${BASE_DESIRED}" "${BASE_MAX}" || true' EXIT
          AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" "${BASE_MIN}" "${BURST_DESIRED}" "${BASE_MAX}"

          # If a previous apply was cancelled, K8s objects may already exist but not be in state.
          # Import them so Phase 2 can converge (avoids "already exists" errors).
          bash ../../scripts/terraform-k8s-import-guard.sh
          # Orphaned / stuck observability Helm releases (pending-install, failed) block Terraform.
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" bash ../../scripts/helm-monitoring-reconcile.sh
          # Phase 2: platform (ACM, controllers) + app_bluegreen and the rest.
          terraform apply -auto-approve
          DOMAIN_ROOT=claiset.xyz FRONTEND_SUBDOMAIN= K8S_APP_NAMESPACE=dev bash ../../scripts/route53-ingress-records-guard.sh

      - name: Wait for readiness
        working-directory: infra/envs/dev
        run: |
          # If dev DB was manually stopped for cost savings, start it so smoke checks are valid.
          RDS_ID="claiset-dev-postgres"
          rds_status="$(aws rds describe-db-instances --region "${AWS_REGION}" --db-instance-identifier "${RDS_ID}" --query 'DBInstances[0].DBInstanceStatus' --output text 2>/dev/null || true)"
          if [[ "${rds_status}" == "stopped" ]]; then
            echo "Starting stopped dev RDS instance: ${RDS_ID}"
            aws rds start-db-instance --region "${AWS_REGION}" --db-instance-identifier "${RDS_ID}" >/dev/null
          fi
          echo "Waiting for dev RDS to be available..."
          aws rds wait db-instance-available --region "${AWS_REGION}" --db-instance-identifier "${RDS_ID}"

          # Reconcile Route53 alias each run (covers cases after manual scale-down/teardown).
          DOMAIN_ROOT=claiset.xyz FRONTEND_SUBDOMAIN= K8S_APP_NAMESPACE=dev bash ../../scripts/route53-ingress-records-guard.sh

          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" K8S_APP_NAMESPACE=dev FRONTEND_HOST=claiset.xyz EXPECT_OBSERVABILITY_SMOKE="${TF_VAR_enable_observability_stack:-false}" GRAFANA_HOST=grafana-dev.claiset.xyz bash ../../scripts/smoke-test-env.sh --wait-only

      - name: Smoke tests
        working-directory: infra/envs/dev
        run: |
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" K8S_APP_NAMESPACE=dev FRONTEND_HOST=claiset.xyz EXPECT_OBSERVABILITY_SMOKE="${TF_VAR_enable_observability_stack:-false}" GRAFANA_HOST=grafana-dev.claiset.xyz bash ../../scripts/smoke-test-env.sh --skip-wait

  qa:
    name: Promote to QA (nightly)
    env:
      EXPECTED_VPC_NAME: claiset-qa
      EXPECTED_CLUSTER_NAME: claiset-qa
    runs-on: ubuntu-latest
    concurrency:
      group: tf-qa-${{ github.repository }}
      cancel-in-progress: false
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'qa')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Observability OAuth preflight (qa)
        run: |
          set -euo pipefail
          if [[ "${TF_VAR_enable_observability_stack:-false}" == "true" ]]; then
            id_trimmed="$(printf '%s' "${TF_VAR_grafana_google_client_id:-}" | tr -d '[:space:]')"
            secret_trimmed="$(printf '%s' "${TF_VAR_grafana_google_client_secret:-}" | tr -d '[:space:]')"
            if [[ -z "${id_trimmed}" || -z "${secret_trimmed}" ]]; then
              echo "Observability enabled but Grafana Google OAuth secrets are empty." >&2
              echo "Set repository secrets GRAFANA_GOOGLE_CLIENT_ID and GRAFANA_GOOGLE_CLIENT_SECRET." >&2
              exit 1
            fi
            echo "::add-mask::${TF_VAR_grafana_google_client_secret}"
            echo "Observability OAuth preflight OK (qa)."
          else
            echo "Observability disabled; skipping OAuth preflight."
          fi

      - name: Set ECR registry from AWS account
        run: |
          acct="$(aws sts get-caller-identity --query Account --output text)"
          echo "ECR_REGISTRY=${acct}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "${GITHUB_ENV}"
          echo "Using ECR registry ${acct}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      - name: Retag ECR images dev → qa
        run: |
          set -euo pipefail
          ecr_promote() {
            local repo="$1" from="$2" to="$3"
            local src_d dest_d="" out rc
            src_d="$(aws ecr describe-images --repository-name "$repo" --image-ids imageTag="$from" --query 'imageDetails[0].imageDigest' --output text | tr -d '[:space:]')"
            dest_d="$(aws ecr describe-images --repository-name "$repo" --image-ids imageTag="$to" --query 'imageDetails[0].imageDigest' --output text 2>/dev/null | tr -d '[:space:]')" || true
            if [[ -n "${dest_d}" && "${dest_d}" == "${src_d}" ]]; then
              echo "${repo}: ${to} already matches ${from}, skipping put-image"
              return 0
            fi
            aws ecr batch-get-image --repository-name "$repo" --image-ids imageTag="$from" --query 'images[0].imageManifest' --output text > manifest.json
            set +e
            out="$(aws ecr put-image --repository-name "$repo" --image-tag "$to" --image-manifest file://manifest.json 2>&1)"
            rc=$?
            set -e
            if [[ "${rc}" -eq 0 ]]; then
              return 0
            fi
            if echo "${out}" | grep -q 'ImageAlreadyExistsException'; then
              echo "${repo}: tag ${to} already points at this digest (idempotent), ok"
              return 0
            fi
            echo "${out}" >&2
            return "${rc}"
          }
          for repo in "${ECR_ITEMS_REPO}" "${ECR_OUTFITS_REPO}" "${ECR_SCHEDULE_REPO}" "${ECR_WEB_REPO}" "${ECR_MIGRATE_REPO}"; do
            ecr_promote "$repo" dev qa
          done

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform init (qa)
        working-directory: infra/envs/qa
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=envs/qa/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: VPC duplicate guard (qa)
        working-directory: infra/envs/qa
        run: bash ../../scripts/terraform-vpc-guard.sh

      - name: EKS import guard (qa)
        working-directory: infra/envs/qa
        run: bash ../../scripts/terraform-eks-import-guard.sh

      - name: Terraform apply (qa)
        working-directory: infra/envs/qa
        run: |
          terraform apply -auto-approve \
            -target=module.network \
            -target=module.eks \
            -target=module.rds

          # Burst node capacity for Phase 2 rollout, then scale down again for cost.
          # Align with env defaults (desired=2, max=6): burst so Helm/controllers always have slots on t3.small.
          BASE_MIN=1
          BASE_DESIRED=2
          BASE_MAX=6
          BURST_DESIRED=5
          CLUSTER="${EXPECTED_CLUSTER_NAME}"
          NODEGROUP="${EXPECTED_CLUSTER_NAME}-default"
          trap 'echo "Scaling nodegroup back down"; AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" "${BASE_MIN}" "${BASE_DESIRED}" "${BASE_MAX}" || true' EXIT
          AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" "${BASE_MIN}" "${BURST_DESIRED}" "${BASE_MAX}"

          # Post-controller health gate: only validate if controller already exists.
          # In the Phase 1 targeted apply (network/eks/rds), the controller may not be
          # created yet because module.platform is applied in Phase 2.
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${CLUSTER}"
          if kubectl -n kube-system get deployment aws-load-balancer-controller >/dev/null 2>&1; then
            if ! kubectl -n kube-system rollout status deployment/aws-load-balancer-controller --timeout=5m; then
              echo "aws-load-balancer-controller not healthy; printing diagnostics" >&2
              kubectl -n kube-system get pods -l app.kubernetes.io/name=aws-load-balancer-controller -o wide || true
              kubectl -n kube-system describe deployment aws-load-balancer-controller || true
              kubectl -n kube-system logs -l app.kubernetes.io/name=aws-load-balancer-controller --tail=120 || true
              exit 1
            fi
          else
            echo "aws-load-balancer-controller not created yet (expected before Phase 2); continuing."
          fi

          K8S_APP_NAMESPACE=qa bash ../../scripts/terraform-k8s-import-guard.sh
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" bash ../../scripts/helm-monitoring-reconcile.sh
          terraform apply -auto-approve
          DOMAIN_ROOT=claiset.xyz K8S_APP_NAMESPACE=qa FRONTEND_SUBDOMAIN=app-qa bash ../../scripts/route53-ingress-records-guard.sh

      - name: Wait for readiness (qa)
        working-directory: infra/envs/qa
        run: |
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" K8S_APP_NAMESPACE=qa FRONTEND_HOST=app-qa.claiset.xyz EXPECT_OBSERVABILITY_SMOKE="${TF_VAR_enable_observability_stack:-false}" GRAFANA_HOST=grafana-qa.claiset.xyz bash ../../scripts/smoke-test-env.sh --wait-only

      - name: Smoke checks (qa)
        working-directory: infra/envs/qa
        run: |
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" K8S_APP_NAMESPACE=qa FRONTEND_HOST=app-qa.claiset.xyz EXPECT_OBSERVABILITY_SMOKE="${TF_VAR_enable_observability_stack:-false}" GRAFANA_HOST=grafana-qa.claiset.xyz bash ../../scripts/smoke-test-env.sh --skip-wait

  uat:
    name: Promote to UAT (PR merge or RC commits)
    env:
      EXPECTED_VPC_NAME: claiset-uat
      EXPECTED_CLUSTER_NAME: claiset-uat
    runs-on: ubuntu-latest
    concurrency:
      group: tf-uat-${{ github.repository }}
      cancel-in-progress: false
    # UAT triggers:
    # 1) PR merged into main (same-repo head — fork PR merges skip automatically for secret safety).
    # 2) Push to main with RC token in merge commit subject/body (not substrings like "resources").
    # 3) workflow_dispatch targeting uat.
    if: |
      (
        github.event_name == 'pull_request'
        && github.event.pull_request.merged == true
        && github.event.pull_request.base.ref == 'main'
        && github.event.pull_request.head.repo.full_name == github.repository
      ) ||
      (
        github.event_name == 'push'
        && github.ref == 'refs/heads/main'
        && github.event.head_commit != null
        && (
          github.event.head_commit.message == 'RC' ||
          startsWith(github.event.head_commit.message, 'RC ') ||
          endsWith(github.event.head_commit.message, ' RC') ||
          contains(github.event.head_commit.message, ' RC ')
        )
      )
      ||
      (
        github.event_name == 'workflow_dispatch'
        && github.event.inputs.target == 'uat'
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Observability OAuth preflight (uat)
        run: |
          set -euo pipefail
          if [[ "${TF_VAR_enable_observability_stack:-false}" == "true" ]]; then
            id_trimmed="$(printf '%s' "${TF_VAR_grafana_google_client_id:-}" | tr -d '[:space:]')"
            secret_trimmed="$(printf '%s' "${TF_VAR_grafana_google_client_secret:-}" | tr -d '[:space:]')"
            if [[ -z "${id_trimmed}" || -z "${secret_trimmed}" ]]; then
              echo "Observability enabled but Grafana Google OAuth secrets are empty." >&2
              echo "Set repository secrets GRAFANA_GOOGLE_CLIENT_ID and GRAFANA_GOOGLE_CLIENT_SECRET." >&2
              exit 1
            fi
            echo "::add-mask::${TF_VAR_grafana_google_client_secret}"
            echo "Observability OAuth preflight OK (uat)."
          else
            echo "Observability disabled; skipping OAuth preflight."
          fi

      - name: Set ECR registry from AWS account
        run: |
          acct="$(aws sts get-caller-identity --query Account --output text)"
          echo "ECR_REGISTRY=${acct}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "${GITHUB_ENV}"
          echo "Using ECR registry ${acct}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      # QA job (nightly/manual) may not have run; ensure dev→qa then qa→uat so :qa exists.
      - name: Retag ECR images dev → qa → uat
        run: |
          set -euo pipefail
          ecr_promote() {
            local repo="$1" from="$2" to="$3"
            local src_d dest_d="" out rc
            src_d="$(aws ecr describe-images --repository-name "$repo" --image-ids imageTag="$from" --query 'imageDetails[0].imageDigest' --output text | tr -d '[:space:]')"
            dest_d="$(aws ecr describe-images --repository-name "$repo" --image-ids imageTag="$to" --query 'imageDetails[0].imageDigest' --output text 2>/dev/null | tr -d '[:space:]')" || true
            if [[ -n "${dest_d}" && "${dest_d}" == "${src_d}" ]]; then
              echo "${repo}: ${to} already matches ${from}, skipping put-image"
              return 0
            fi
            aws ecr batch-get-image --repository-name "$repo" --image-ids imageTag="$from" --query 'images[0].imageManifest' --output text > manifest.json
            set +e
            out="$(aws ecr put-image --repository-name "$repo" --image-tag "$to" --image-manifest file://manifest.json 2>&1)"
            rc=$?
            set -e
            if [[ "${rc}" -eq 0 ]]; then
              return 0
            fi
            if echo "${out}" | grep -q 'ImageAlreadyExistsException'; then
              echo "${repo}: tag ${to} already points at this digest (idempotent), ok"
              return 0
            fi
            echo "${out}" >&2
            return "${rc}"
          }
          for repo in "${ECR_ITEMS_REPO}" "${ECR_OUTFITS_REPO}" "${ECR_SCHEDULE_REPO}" "${ECR_WEB_REPO}" "${ECR_MIGRATE_REPO}"; do
            ecr_promote "$repo" dev qa
          done
          for repo in "${ECR_ITEMS_REPO}" "${ECR_OUTFITS_REPO}" "${ECR_SCHEDULE_REPO}" "${ECR_WEB_REPO}" "${ECR_MIGRATE_REPO}"; do
            ecr_promote "$repo" qa uat
          done

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform init (uat)
        working-directory: infra/envs/uat
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=envs/uat/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: VPC duplicate guard (uat)
        working-directory: infra/envs/uat
        run: bash ../../scripts/terraform-vpc-guard.sh

      - name: EKS import guard (uat)
        working-directory: infra/envs/uat
        run: bash ../../scripts/terraform-eks-import-guard.sh

      # When using external hosted zone secret, stop managing any previously-created
      # duplicate zone in state so re-runs from partial applies don't fail on zone drift.
      - name: Route53 state rm (external hosted zone secret)
        working-directory: infra/envs/uat
        run: |
          set -euo pipefail
          if [[ -n "${TF_VAR_route53_hosted_zone_id:-}" ]]; then
            terraform state rm 'module.platform.aws_route53_zone.this[0]' 2>/dev/null || true
          fi

      - name: Terraform apply (uat)
        working-directory: infra/envs/uat
        run: |
          terraform apply -auto-approve \
            -target=module.network \
            -target=module.eks \
            -target=module.rds

          # Same as dev: UAT had no burst and hit "Too many pods" on platform Helm (external-dns Pending).
          BASE_MIN=1
          BASE_DESIRED=2
          BASE_MAX=6
          BURST_DESIRED=5
          CLUSTER="${EXPECTED_CLUSTER_NAME}"
          NODEGROUP="${EXPECTED_CLUSTER_NAME}-default"
          trap 'echo "Scaling nodegroup back down"; AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" "${BASE_MIN}" "${BASE_DESIRED}" "${BASE_MAX}" || true' EXIT
          AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" "${BASE_MIN}" "${BURST_DESIRED}" "${BASE_MAX}"

          K8S_APP_NAMESPACE=uat bash ../../scripts/terraform-k8s-import-guard.sh
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" bash ../../scripts/helm-monitoring-reconcile.sh
          terraform apply -auto-approve
          DOMAIN_ROOT=claiset.xyz K8S_APP_NAMESPACE=uat FRONTEND_SUBDOMAIN=app-uat bash ../../scripts/route53-ingress-records-guard.sh

      - name: Wait for readiness (uat)
        working-directory: infra/envs/uat
        run: |
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" K8S_APP_NAMESPACE=uat FRONTEND_HOST=app-uat.claiset.xyz EXPECT_OBSERVABILITY_SMOKE="${TF_VAR_enable_observability_stack:-false}" GRAFANA_HOST=grafana-uat.claiset.xyz bash ../../scripts/smoke-test-env.sh --wait-only

      - name: Smoke checks (uat)
        working-directory: infra/envs/uat
        run: |
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" K8S_APP_NAMESPACE=uat FRONTEND_HOST=app-uat.claiset.xyz EXPECT_OBSERVABILITY_SMOKE="${TF_VAR_enable_observability_stack:-false}" GRAFANA_HOST=grafana-uat.claiset.xyz bash ../../scripts/smoke-test-env.sh --skip-wait

  prod:
    name: Promote to production (tags)
    env:
      EXPECTED_VPC_NAME: claiset-prod
      EXPECTED_CLUSTER_NAME: claiset-prod
    runs-on: ubuntu-latest
    concurrency:
      group: tf-prod-${{ github.repository }}
      cancel-in-progress: false
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Observability OAuth preflight (prod)
        run: |
          set -euo pipefail
          if [[ "${TF_VAR_enable_observability_stack:-false}" == "true" ]]; then
            id_trimmed="$(printf '%s' "${TF_VAR_grafana_google_client_id:-}" | tr -d '[:space:]')"
            secret_trimmed="$(printf '%s' "${TF_VAR_grafana_google_client_secret:-}" | tr -d '[:space:]')"
            if [[ -z "${id_trimmed}" || -z "${secret_trimmed}" ]]; then
              echo "Observability enabled but Grafana Google OAuth secrets are empty." >&2
              echo "Set repository secrets GRAFANA_GOOGLE_CLIENT_ID and GRAFANA_GOOGLE_CLIENT_SECRET." >&2
              exit 1
            fi
            echo "::add-mask::${TF_VAR_grafana_google_client_secret}"
            echo "Observability OAuth preflight OK (prod)."
          else
            echo "Observability disabled; skipping OAuth preflight."
          fi

      - name: Set ECR registry from AWS account
        run: |
          acct="$(aws sts get-caller-identity --query Account --output text)"
          echo "ECR_REGISTRY=${acct}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "${GITHUB_ENV}"
          echo "Using ECR registry ${acct}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      # Ensure full chain so :uat exists even if UAT/QA jobs did not run before this tag push.
      - name: Retag ECR images dev → qa → uat → prod
        run: |
          set -euo pipefail
          ecr_promote() {
            local repo="$1" from="$2" to="$3"
            local src_d dest_d="" out rc
            src_d="$(aws ecr describe-images --repository-name "$repo" --image-ids imageTag="$from" --query 'imageDetails[0].imageDigest' --output text | tr -d '[:space:]')"
            dest_d="$(aws ecr describe-images --repository-name "$repo" --image-ids imageTag="$to" --query 'imageDetails[0].imageDigest' --output text 2>/dev/null | tr -d '[:space:]')" || true
            if [[ -n "${dest_d}" && "${dest_d}" == "${src_d}" ]]; then
              echo "${repo}: ${to} already matches ${from}, skipping put-image"
              return 0
            fi
            aws ecr batch-get-image --repository-name "$repo" --image-ids imageTag="$from" --query 'images[0].imageManifest' --output text > manifest.json
            set +e
            out="$(aws ecr put-image --repository-name "$repo" --image-tag "$to" --image-manifest file://manifest.json 2>&1)"
            rc=$?
            set -e
            if [[ "${rc}" -eq 0 ]]; then
              return 0
            fi
            if echo "${out}" | grep -q 'ImageAlreadyExistsException'; then
              echo "${repo}: tag ${to} already points at this digest (idempotent), ok"
              return 0
            fi
            echo "${out}" >&2
            return "${rc}"
          }
          for repo in "${ECR_ITEMS_REPO}" "${ECR_OUTFITS_REPO}" "${ECR_SCHEDULE_REPO}" "${ECR_WEB_REPO}" "${ECR_MIGRATE_REPO}"; do
            ecr_promote "$repo" dev qa
            ecr_promote "$repo" qa uat
            ecr_promote "$repo" uat prod
          done

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform init (prod)
        working-directory: infra/envs/prod
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=envs/prod/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: VPC duplicate guard (prod)
        working-directory: infra/envs/prod
        run: bash ../../scripts/terraform-vpc-guard.sh

      - name: EKS import guard (prod)
        working-directory: infra/envs/prod
        run: bash ../../scripts/terraform-eks-import-guard.sh

      - name: Terraform apply (prod)
        working-directory: infra/envs/prod
        run: |
          terraform apply -auto-approve \
            -target=module.network \
            -target=module.eks \
            -target=module.rds

          BASE_MIN=1
          BASE_DESIRED=2
          BASE_MAX=6
          BURST_DESIRED=5
          CLUSTER="${EXPECTED_CLUSTER_NAME}"
          NODEGROUP="${EXPECTED_CLUSTER_NAME}-default"
          trap 'echo "Scaling nodegroup back down"; AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" "${BASE_MIN}" "${BASE_DESIRED}" "${BASE_MAX}" || true' EXIT
          AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" "${BASE_MIN}" "${BURST_DESIRED}" "${BASE_MAX}"

          K8S_APP_NAMESPACE=prod bash ../../scripts/terraform-k8s-import-guard.sh
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" bash ../../scripts/helm-monitoring-reconcile.sh
          terraform apply -auto-approve
          DOMAIN_ROOT=claiset.xyz K8S_APP_NAMESPACE=prod FRONTEND_SUBDOMAIN=app-prod bash ../../scripts/route53-ingress-records-guard.sh

      - name: Wait for readiness (prod)
        working-directory: infra/envs/prod
        run: |
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" K8S_APP_NAMESPACE=prod FRONTEND_HOST=app-prod.claiset.xyz EXPECT_OBSERVABILITY_SMOKE="${TF_VAR_enable_observability_stack:-false}" GRAFANA_HOST=grafana-prod.claiset.xyz bash ../../scripts/smoke-test-env.sh --wait-only

      - name: Smoke checks (prod)
        working-directory: infra/envs/prod
        run: |
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" K8S_APP_NAMESPACE=prod FRONTEND_HOST=app-prod.claiset.xyz EXPECT_OBSERVABILITY_SMOKE="${TF_VAR_enable_observability_stack:-false}" GRAFANA_HOST=grafana-prod.claiset.xyz bash ../../scripts/smoke-test-env.sh --skip-wait

