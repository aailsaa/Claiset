name: Promotion (dev → qa → uat → prod)

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  # Merge to default branch (squash merge or merge commit): promote to UAT without RC in tip message.
  # Fork PR merges are skipped (`head.repo`) so workflows keep access to Actions secrets safely.
  pull_request:
    types:
      - closed
    branches:
      - main
  schedule:
    # Nightly QA promotion (UTC). Adjust as needed.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Environment to deploy (dev|qa|uat|prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - uat
          - prod

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  # ECR_REGISTRY is set per job after AWS credentials (see "Set ECR registry from AWS account").
  # Opt into Node.js 24 for JavaScript-based actions (GitHub runner deprecation notice).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
  TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
  # Passed to Terraform as var.route53_hosted_zone_id (see infra/envs/*/variables.tf).
  TF_VAR_route53_hosted_zone_id: ${{ secrets.ROUTE53_HOSTED_ZONE_ID }}
  # Self-hosted Grafana/Prometheus/Loki (all env Terraform jobs inherit these).
  # Repository variable ENABLE_OBSERVABILITY = true to turn on; requires secrets below.
  TF_VAR_enable_observability_stack: ${{ (vars.ENABLE_OBSERVABILITY == 'true' && vars.ALLOW_COSTLY_RUNS == 'true') && 'true' || 'false' }}
  # Proof toggles (repo variables): enable independently for metrics/logging evidence runs.
  PROOF_NODE_EXPORTER: ${{ vars.PROOF_NODE_EXPORTER == 'true' && 'true' || 'false' }}
  PROOF_LOKI_LOGS: ${{ vars.PROOF_LOKI_LOGS == 'true' && 'true' || 'false' }}
  # Enable DaemonSet collectors when either proof mode needs them.
  TF_VAR_enable_observability_daemonsets: ${{ ((vars.PROOF_NODE_EXPORTER == 'true' || vars.PROOF_LOKI_LOGS == 'true') && vars.ALLOW_COSTLY_RUNS == 'true') && 'true' || 'false' }}
  TF_VAR_enable_node_exporter: ${{ (vars.PROOF_NODE_EXPORTER == 'true' && vars.ALLOW_COSTLY_RUNS == 'true') && 'true' || 'false' }}
  TF_VAR_enable_promtail: ${{ (vars.PROOF_LOKI_LOGS == 'true' && vars.ALLOW_COSTLY_RUNS == 'true') && 'true' || 'false' }}
  TF_VAR_grafana_google_client_id: ${{ secrets.GRAFANA_GOOGLE_CLIENT_ID }}
  TF_VAR_grafana_google_client_secret: ${{ secrets.GRAFANA_GOOGLE_CLIENT_SECRET }}
  TF_VAR_grafana_google_allowed_domains: ${{ vars.GRAFANA_GOOGLE_ALLOWED_DOMAINS }}
  TF_VAR_alertmanager_email_to: ${{ secrets.ALERTMANAGER_EMAIL_TO }}
  TF_VAR_alertmanager_smtp_smarthost: ${{ secrets.ALERTMANAGER_SMTP_SMARTHOST }}
  TF_VAR_alertmanager_smtp_from: ${{ secrets.ALERTMANAGER_SMTP_FROM }}
  TF_VAR_alertmanager_smtp_user: ${{ secrets.ALERTMANAGER_SMTP_USER }}
  TF_VAR_alertmanager_smtp_password: ${{ secrets.ALERTMANAGER_SMTP_PASSWORD }}
  # Post-smoke nodegroup scale-down (dev/qa/uat/prod). Default true (cost).
  # Set SCALE_DOWN_NODEGROUP_AFTER_SMOKE=false in GitHub Variables to keep clusters warm for manual testing.
  SCALE_DOWN_NODEGROUP_AFTER_SMOKE: ${{ vars.SCALE_DOWN_NODEGROUP_AFTER_SMOKE == 'false' && 'false' || 'true' }}
  ALLOW_COSTLY_RUNS: ${{ vars.ALLOW_COSTLY_RUNS == 'true' && 'true' || 'false' }}
  # Single canonical ECR namespace (provisioned in infra/envs/dev; qa+ reference URLs only).
  ECR_ITEMS_REPO: claiset-items
  ECR_OUTFITS_REPO: claiset-outfits
  ECR_SCHEDULE_REPO: claiset-schedule
  ECR_WEB_REPO: claiset-web
  ECR_MIGRATE_REPO: claiset-migrate

jobs:
  dev:
    name: Build + deploy dev
    env:
      # Must match infra/envs/dev defaults: project claiset + env dev (VPC/EKS Name tag).
      EXPECTED_VPC_NAME: claiset-dev
      EXPECTED_CLUSTER_NAME: claiset-dev
      # ALB SPA canary (repo Variables): set ALB_CANARY_DEV_ENABLED=true to turn on; optional ALB_CANARY_DEV_TRAFFIC_PERCENT (1–50), ALB_CANARY_DEV_WEB_REPLICAS (0–5).
      TF_VAR_enable_alb_weighted_canary_for_web: ${{ vars.ALB_CANARY_DEV_ENABLED == 'true' && 'true' || 'false' }}
      TF_VAR_alb_web_canary_traffic_percent: ${{ vars.ALB_CANARY_DEV_TRAFFIC_PERCENT != '' && vars.ALB_CANARY_DEV_TRAFFIC_PERCENT || '0' }}
      TF_VAR_web_canary_replicas: ${{ vars.ALB_CANARY_DEV_WEB_REPLICAS != '' && vars.ALB_CANARY_DEV_WEB_REPLICAS || '0' }}
    runs-on: ubuntu-latest
    concurrency:
      group: tf-dev-${{ github.repository }}
      cancel-in-progress: false
    # Push to main runs dev unless the tip commit subject/body contains [skip-dev] (e.g. QA-only infra tweaks).
    # Manual dispatch with target dev always runs. Nightly QA does not use this job.
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main' && !(github.event.head_commit != null && contains(github.event.head_commit.message, '[skip-dev]'))) || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'dev')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Observability OAuth preflight (dev)
        run: |
          set -euo pipefail
          if [[ "${TF_VAR_enable_observability_stack:-false}" == "true" ]]; then
            id_trimmed="$(printf '%s' "${TF_VAR_grafana_google_client_id:-}" | tr -d '[:space:]')"
            secret_trimmed="$(printf '%s' "${TF_VAR_grafana_google_client_secret:-}" | tr -d '[:space:]')"
            if [[ -z "${id_trimmed}" || -z "${secret_trimmed}" ]]; then
              echo "Observability enabled but Grafana Google OAuth secrets are empty." >&2
              echo "Set repository secrets GRAFANA_GOOGLE_CLIENT_ID and GRAFANA_GOOGLE_CLIENT_SECRET." >&2
              exit 1
            fi
            echo "::add-mask::${TF_VAR_grafana_google_client_secret}"
            echo "Observability OAuth preflight OK (dev)."
          else
            echo "Observability disabled; skipping OAuth preflight."
          fi

      - name: Set ECR registry from AWS account
        run: |
          acct="$(aws sts get-caller-identity --query Account --output text)"
          echo "ECR_REGISTRY=${acct}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "${GITHUB_ENV}"
          echo "Using ECR registry ${acct}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

      - name: Ensure ECR repositories exist
        run: |
          set -euo pipefail
          repos=(
            "${ECR_ITEMS_REPO}"
            "${ECR_OUTFITS_REPO}"
            "${ECR_SCHEDULE_REPO}"
            "${ECR_MIGRATE_REPO}"
            "${ECR_WEB_REPO}"
          )
          for repo in "${repos[@]}"; do
            if ! aws ecr describe-repositories --repository-names "${repo}" >/dev/null 2>&1; then
              echo "Creating missing ECR repository: ${repo}"
              aws ecr create-repository --repository-name "${repo}" >/dev/null
            fi
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: "Build + push images (tag: dev)"
        env:
          # Default BuildKit attestations add extra manifests; ECR pushes can stall or run long without this.
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        run: |
          set -euo pipefail
          docker buildx build --platform linux/amd64 --provenance=false \
            -f cmd/items-service/Dockerfile   -t "${ECR_REGISTRY}/${ECR_ITEMS_REPO}:dev"   --push .
          docker buildx build --platform linux/amd64 --provenance=false \
            -f cmd/outfits-service/Dockerfile -t "${ECR_REGISTRY}/${ECR_OUTFITS_REPO}:dev" --push .
          docker buildx build --platform linux/amd64 --provenance=false \
            -f cmd/schedule-service/Dockerfile -t "${ECR_REGISTRY}/${ECR_SCHEDULE_REPO}:dev" --push .
          docker buildx build --platform linux/amd64 --provenance=false \
            -f cmd/migrate/Dockerfile        -t "${ECR_REGISTRY}/${ECR_MIGRATE_REPO}:dev" --push .
          docker buildx build --platform linux/amd64 --provenance=false \
            -f web/Dockerfile                -t "${ECR_REGISTRY}/${ECR_WEB_REPO}:dev"     --push .

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/envs/dev
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=envs/dev/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: VPC duplicate guard
        working-directory: infra/envs/dev
        run: bash ../../scripts/terraform-vpc-guard.sh

      - name: EKS import guard
        working-directory: infra/envs/dev
        run: bash ../../scripts/terraform-eks-import-guard.sh

      - name: ECR import guard
        working-directory: infra/envs/dev
        run: bash ../../scripts/terraform-ecr-import-guard.sh

      - name: ECR state reconcile
        working-directory: infra/envs/dev
        run: |
          set -euo pipefail
          repos=(items outfits schedule web migrate)
          for suffix in "${repos[@]}"; do
            repo="claiset-${suffix}"
            addr="module.ecr.aws_ecr_repository.this[\"${suffix}\"]"
            if aws ecr describe-repositories --region "${AWS_REGION}" --repository-names "${repo}" >/dev/null 2>&1; then
              if terraform state show -no-color "${addr}" >/dev/null 2>&1; then
                echo "${repo} already in terraform state"
              else
                echo "Importing ${repo} into terraform state"
                terraform import "${addr}" "${repo}"
              fi
            fi
          done

      # Switching to route53_hosted_zone_id drops aws_route53_zone from config; Terraform would
      # otherwise try DeleteHostedZone on the old duplicate — fails while ACM/other records exist.
      # Stop managing it in state; delete the duplicate zone in AWS console later if needed.
      - name: Route53 state rm (external hosted zone secret)
        working-directory: infra/envs/dev
        run: |
          set -euo pipefail
          if [[ -n "${TF_VAR_route53_hosted_zone_id:-}" ]]; then
            terraform state rm 'module.platform.aws_route53_zone.this[0]' 2>/dev/null || true
          fi

      - name: Terraform apply
        working-directory: infra/envs/dev
        run: |
          # If the nodegroup was manually scaled down (e.g. 1/1/2), the first apply can fail:
          # Terraform raises min_size (2) while lifecycle ignores desired_size drift → AWS still
          # has desired=1 → InvalidParameterException: min can't exceed desired. Align first.
          CLUSTER="${EXPECTED_CLUSTER_NAME}"
          NODEGROUP="${EXPECTED_CLUSTER_NAME}-default"
          AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" 2 3 6

          # Phase 1: base AWS only (no platform/ACM/Helm) so a bad DNS/ACM run does not
          # half-apply Helm or leave -target state inconsistent with AWS.
          terraform apply -auto-approve \
            -target=module.network \
            -target=module.eks \
            -target=module.rds \
            -target=module.ecr

          # Burst node capacity for Phase 2 rollout. Scale-down runs AFTER smoke tests (separate step)
          # so Grafana/monitoring checks are not racing cluster autoscaler right after apply.
          BASE_MIN=2
          BASE_DESIRED=3
          BASE_MAX=6
          BURST_DESIRED=6
          CLUSTER="${EXPECTED_CLUSTER_NAME}"
          NODEGROUP="${EXPECTED_CLUSTER_NAME}-default"
          AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" "${BASE_MIN}" "${BURST_DESIRED}" "${BASE_MAX}"
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${CLUSTER}"
          K8S_NAMESPACES="prod monitoring platform kube-system" bash ../../scripts/k8s-gc-pods.sh
          echo "Waiting for burst node count to be Ready before Phase 2..."
          for i in {1..30}; do
            ready_nodes="$(kubectl get nodes --no-headers 2>/dev/null | awk '$2=="Ready"{c++} END{print c+0}')"
            echo "Ready nodes: ${ready_nodes}/${BURST_DESIRED} (attempt ${i}/30)"
            if [[ "${ready_nodes}" -ge "${BURST_DESIRED}" ]]; then
              break
            fi
            sleep 10
          done
          # Clear accidental SchedulingDisabled state that can linger after interrupted runs.
          kubectl get nodes --no-headers 2>/dev/null | awk '$2 ~ /SchedulingDisabled/ {print $1}' | xargs -r kubectl uncordon || true

          # If a previous apply was cancelled, K8s objects may already exist but not be in state.
          # Import them so Phase 2 can converge (avoids "already exists" errors).
          bash ../../scripts/terraform-k8s-import-guard.sh
          # Stuck ALB controller / external-dns / cluster-autoscaler releases block Helm apply.
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" bash ../../scripts/helm-platform-reconcile.sh
          # Orphaned / stuck observability Helm releases (pending-install, failed) block Terraform.
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" bash ../../scripts/helm-monitoring-reconcile.sh
          # Phase 2: platform (ACM, controllers) + workloads (Ingress + app Deployments, migrate Job) + remainder of stack.
          terraform apply -auto-approve
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" DOMAIN_ROOT=claiset.xyz FRONTEND_SUBDOMAIN=app-dev UPDATE_APEX_DNS=false K8S_APP_NAMESPACE=dev bash ../../scripts/route53-ingress-records-guard.sh

      - name: Migrate job wait + logs (dev)
        working-directory: infra/envs/dev
        run: |
          set -euo pipefail
          bash ../../scripts/kubectl-migrate-job-wait-and-logs.sh dev migrate 720

      - name: Wait for readiness
        working-directory: infra/envs/dev
        run: |
          # If dev DB was manually stopped for cost savings, start it so smoke checks are valid.
          RDS_ID="claiset-dev-postgres"
          rds_status="$(aws rds describe-db-instances --region "${AWS_REGION}" --db-instance-identifier "${RDS_ID}" --query 'DBInstances[0].DBInstanceStatus' --output text 2>/dev/null || true)"
          if [[ "${rds_status}" == "stopped" ]]; then
            echo "Starting stopped dev RDS instance: ${RDS_ID}"
            aws rds start-db-instance --region "${AWS_REGION}" --db-instance-identifier "${RDS_ID}" >/dev/null
          fi
          echo "Waiting for dev RDS to be available..."
          aws rds wait db-instance-available --region "${AWS_REGION}" --db-instance-identifier "${RDS_ID}"

          # Reconcile Route53 alias each run (covers cases after manual scale-down/teardown).
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" DOMAIN_ROOT=claiset.xyz FRONTEND_SUBDOMAIN=app-dev UPDATE_APEX_DNS=false K8S_APP_NAMESPACE=dev bash ../../scripts/route53-ingress-records-guard.sh

          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" K8S_APP_NAMESPACE=dev FRONTEND_HOST=app-dev.claiset.xyz EXPECT_OBSERVABILITY_SMOKE="${TF_VAR_enable_observability_stack:-false}" EXPECT_APP_OAUTH_SMOKE=true GRAFANA_HOST=grafana-dev.claiset.xyz bash ../../scripts/smoke-test-env.sh --wait-only

      - name: Smoke tests
        working-directory: infra/envs/dev
        run: |
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" K8S_APP_NAMESPACE=dev FRONTEND_HOST=app-dev.claiset.xyz EXPECT_OBSERVABILITY_SMOKE="${TF_VAR_enable_observability_stack:-false}" EXPECT_APP_OAUTH_SMOKE=true GRAFANA_HOST=grafana-dev.claiset.xyz bash ../../scripts/smoke-test-env.sh --skip-wait

      # Post-smoke: warmer baseline than min=1/desired=3 — avoids single-node pinch (app + observability).
      - name: Scale dev nodegroup down (post-smoke)
        if: always() && env.SCALE_DOWN_NODEGROUP_AFTER_SMOKE == 'true'
        working-directory: infra/envs/dev
        run: |
          CLUSTER="${EXPECTED_CLUSTER_NAME}"
          NODEGROUP="${EXPECTED_CLUSTER_NAME}-default"
          AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" 2 4 6

  qa:
    name: Promote to QA (nightly)
    env:
      EXPECTED_VPC_NAME: claiset-qa
      EXPECTED_CLUSTER_NAME: claiset-qa
      # ALB SPA canary (repo Variables): ALB_CANARY_QA_ENABLED, ALB_CANARY_QA_TRAFFIC_PERCENT, ALB_CANARY_QA_WEB_REPLICAS (defaults match infra/envs/qa/variables.tf when unset).
      TF_VAR_enable_alb_weighted_canary_for_web: ${{ vars.ALB_CANARY_QA_ENABLED == 'true' && 'true' || 'false' }}
      TF_VAR_alb_web_canary_traffic_percent: ${{ vars.ALB_CANARY_QA_TRAFFIC_PERCENT != '' && vars.ALB_CANARY_QA_TRAFFIC_PERCENT || '0' }}
      TF_VAR_web_canary_replicas: ${{ vars.ALB_CANARY_QA_WEB_REPLICAS != '' && vars.ALB_CANARY_QA_WEB_REPLICAS || '0' }}
    runs-on: ubuntu-latest
    concurrency:
      group: tf-qa-${{ github.repository }}
      cancel-in-progress: false
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'qa')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Observability OAuth preflight (qa)
        run: |
          set -euo pipefail
          if [[ "${TF_VAR_enable_observability_stack:-false}" == "true" ]]; then
            id_trimmed="$(printf '%s' "${TF_VAR_grafana_google_client_id:-}" | tr -d '[:space:]')"
            secret_trimmed="$(printf '%s' "${TF_VAR_grafana_google_client_secret:-}" | tr -d '[:space:]')"
            if [[ -z "${id_trimmed}" || -z "${secret_trimmed}" ]]; then
              echo "Observability enabled but Grafana Google OAuth secrets are empty." >&2
              echo "Set repository secrets GRAFANA_GOOGLE_CLIENT_ID and GRAFANA_GOOGLE_CLIENT_SECRET." >&2
              exit 1
            fi
            echo "::add-mask::${TF_VAR_grafana_google_client_secret}"
            echo "Observability OAuth preflight OK (qa)."
          else
            echo "Observability disabled; skipping OAuth preflight."
          fi

      - name: Set ECR registry from AWS account
        run: |
          acct="$(aws sts get-caller-identity --query Account --output text)"
          echo "ECR_REGISTRY=${acct}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "${GITHUB_ENV}"
          echo "Using ECR registry ${acct}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      - name: Retag ECR images dev → qa
        run: |
          set -euo pipefail
          ecr_promote() {
            local repo="$1" from="$2" to="$3"
            local src_d dest_d="" out rc
            src_d="$(aws ecr describe-images --repository-name "$repo" --image-ids imageTag="$from" --query 'imageDetails[0].imageDigest' --output text | tr -d '[:space:]')"
            dest_d="$(aws ecr describe-images --repository-name "$repo" --image-ids imageTag="$to" --query 'imageDetails[0].imageDigest' --output text 2>/dev/null | tr -d '[:space:]')" || true
            if [[ -n "${dest_d}" && "${dest_d}" == "${src_d}" ]]; then
              echo "${repo}: ${to} already matches ${from}, skipping put-image"
              return 0
            fi
            aws ecr batch-get-image --repository-name "$repo" --image-ids imageTag="$from" --query 'images[0].imageManifest' --output text > manifest.json
            set +e
            out="$(aws ecr put-image --repository-name "$repo" --image-tag "$to" --image-manifest file://manifest.json 2>&1)"
            rc=$?
            set -e
            if [[ "${rc}" -eq 0 ]]; then
              return 0
            fi
            if echo "${out}" | grep -q 'ImageAlreadyExistsException'; then
              echo "${repo}: tag ${to} already points at this digest (idempotent), ok"
              return 0
            fi
            echo "${out}" >&2
            return "${rc}"
          }
          for repo in "${ECR_ITEMS_REPO}" "${ECR_OUTFITS_REPO}" "${ECR_SCHEDULE_REPO}" "${ECR_WEB_REPO}" "${ECR_MIGRATE_REPO}"; do
            ecr_promote "$repo" dev qa
          done

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform init (qa)
        working-directory: infra/envs/qa
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=envs/qa/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: VPC duplicate guard (qa)
        working-directory: infra/envs/qa
        run: bash ../../scripts/terraform-vpc-guard.sh

      - name: EKS import guard (qa)
        working-directory: infra/envs/qa
        run: bash ../../scripts/terraform-eks-import-guard.sh

      - name: Terraform apply (qa)
        working-directory: infra/envs/qa
        run: |
          terraform apply -auto-approve \
            -target=module.network \
            -target=module.eks \
            -target=module.rds

          # Burst for Phase 2; scale-down after smoke tests (do not EXIT-trap before smoke — hurts Grafana).
          BASE_MIN=1
          BASE_DESIRED=3
          BASE_MAX=6
          BURST_DESIRED=6
          CLUSTER="${EXPECTED_CLUSTER_NAME}"
          NODEGROUP="${EXPECTED_CLUSTER_NAME}-default"
          AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" "${BASE_MIN}" "${BURST_DESIRED}" "${BASE_MAX}"

          # ALB controller is created by module.platform in Phase 2 below.
          # Skip pre-checks in Phase 1 to avoid false failures on fresh clusters.
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${CLUSTER}"
          echo "Waiting for burst node count to be Ready before Phase 2..."
          for i in {1..30}; do
            ready_nodes="$(kubectl get nodes --no-headers 2>/dev/null | awk '$2=="Ready"{c++} END{print c+0}')"
            echo "Ready nodes: ${ready_nodes}/${BURST_DESIRED} (attempt ${i}/30)"
            if [[ "${ready_nodes}" -ge "${BURST_DESIRED}" ]]; then
              break
            fi
            sleep 10
          done
          # Clear accidental SchedulingDisabled state that can linger after interrupted runs.
          kubectl get nodes --no-headers 2>/dev/null | awk '$2 ~ /SchedulingDisabled/ {print $1}' | xargs -r kubectl uncordon || true
          ready_nodes="$(kubectl get nodes --no-headers 2>/dev/null | awk '$2=="Ready"{c++} END{print c+0}')"
          if [[ "${ready_nodes}" -lt "${BURST_DESIRED}" ]]; then
            echo "Burst capacity not reached (Ready nodes=${ready_nodes}, expected=${BURST_DESIRED}); continuing anyway." >&2
          fi

          K8S_APP_NAMESPACE=qa bash ../../scripts/terraform-k8s-import-guard.sh
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" bash ../../scripts/helm-platform-reconcile.sh
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" bash ../../scripts/helm-monitoring-reconcile.sh
          terraform apply -auto-approve
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" DOMAIN_ROOT=claiset.xyz K8S_APP_NAMESPACE=qa FRONTEND_SUBDOMAIN=app-qa UPDATE_APEX_DNS=false bash ../../scripts/route53-ingress-records-guard.sh

      - name: Wait for readiness (qa)
        working-directory: infra/envs/qa
        run: |
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" K8S_APP_NAMESPACE=qa FRONTEND_HOST=app-qa.claiset.xyz EXPECT_OBSERVABILITY_SMOKE="${TF_VAR_enable_observability_stack:-false}" EXPECT_APP_OAUTH_SMOKE=true GRAFANA_HOST=grafana-qa.claiset.xyz bash ../../scripts/smoke-test-env.sh --wait-only

      - name: Smoke checks (qa)
        working-directory: infra/envs/qa
        run: |
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" K8S_APP_NAMESPACE=qa FRONTEND_HOST=app-qa.claiset.xyz EXPECT_OBSERVABILITY_SMOKE="${TF_VAR_enable_observability_stack:-false}" EXPECT_APP_OAUTH_SMOKE=true GRAFANA_HOST=grafana-qa.claiset.xyz bash ../../scripts/smoke-test-env.sh --skip-wait

      - name: Scale qa nodegroup down (post-smoke)
        if: always() && env.SCALE_DOWN_NODEGROUP_AFTER_SMOKE == 'true'
        working-directory: infra/envs/qa
        run: |
          CLUSTER="${EXPECTED_CLUSTER_NAME}"
          NODEGROUP="${EXPECTED_CLUSTER_NAME}-default"
          AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" 2 4 6

  uat:
    name: Promote to UAT (PR merge or RC commits)
    env:
      EXPECTED_VPC_NAME: claiset-uat
      EXPECTED_CLUSTER_NAME: claiset-uat
      # ALB SPA canary (repo Variables): ALB_CANARY_UAT_ENABLED=false turns off; unset/other → on. ALB_CANARY_UAT_TRAFFIC_PERCENT (default 10), ALB_CANARY_UAT_WEB_REPLICAS (default 2).
      TF_VAR_enable_alb_weighted_canary_for_web: ${{ vars.ALB_CANARY_UAT_ENABLED == 'false' && 'false' || 'true' }}
      TF_VAR_alb_web_canary_traffic_percent: ${{ vars.ALB_CANARY_UAT_TRAFFIC_PERCENT != '' && vars.ALB_CANARY_UAT_TRAFFIC_PERCENT || '10' }}
      TF_VAR_web_canary_replicas: ${{ vars.ALB_CANARY_UAT_WEB_REPLICAS != '' && vars.ALB_CANARY_UAT_WEB_REPLICAS || '2' }}
    runs-on: ubuntu-latest
    concurrency:
      group: tf-uat-${{ github.repository }}
      cancel-in-progress: false
    # UAT triggers:
    # 1) PR merged into main (same-repo head — fork PR merges skip automatically for secret safety).
    # 2) Push to main with RC token in merge commit subject/body (not substrings like "resources").
    # 3) workflow_dispatch targeting uat.
    if: |
      (
        github.event_name == 'pull_request'
        && github.event.pull_request.merged == true
        && github.event.pull_request.base.ref == 'main'
        && github.event.pull_request.head.repo.full_name == github.repository
      ) ||
      (
        github.event_name == 'push'
        && github.ref == 'refs/heads/main'
        && github.event.head_commit != null
        && (
          github.event.head_commit.message == 'RC' ||
          startsWith(github.event.head_commit.message, 'RC ') ||
          endsWith(github.event.head_commit.message, ' RC') ||
          contains(github.event.head_commit.message, ' RC ')
        )
      )
      ||
      (
        github.event_name == 'workflow_dispatch'
        && github.event.inputs.target == 'uat'
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Observability OAuth preflight (uat)
        run: |
          set -euo pipefail
          if [[ "${TF_VAR_enable_observability_stack:-false}" == "true" ]]; then
            id_trimmed="$(printf '%s' "${TF_VAR_grafana_google_client_id:-}" | tr -d '[:space:]')"
            secret_trimmed="$(printf '%s' "${TF_VAR_grafana_google_client_secret:-}" | tr -d '[:space:]')"
            if [[ -z "${id_trimmed}" || -z "${secret_trimmed}" ]]; then
              echo "Observability enabled but Grafana Google OAuth secrets are empty." >&2
              echo "Set repository secrets GRAFANA_GOOGLE_CLIENT_ID and GRAFANA_GOOGLE_CLIENT_SECRET." >&2
              exit 1
            fi
            echo "::add-mask::${TF_VAR_grafana_google_client_secret}"
            echo "Observability OAuth preflight OK (uat)."
          else
            echo "Observability disabled; skipping OAuth preflight."
          fi

      - name: Set ECR registry from AWS account
        run: |
          acct="$(aws sts get-caller-identity --query Account --output text)"
          echo "ECR_REGISTRY=${acct}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "${GITHUB_ENV}"
          echo "Using ECR registry ${acct}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      # QA job (nightly/manual) may not have run; ensure dev→qa then qa→uat so :qa exists.
      - name: Retag ECR images dev → qa → uat
        run: |
          set -euo pipefail
          ecr_promote() {
            local repo="$1" from="$2" to="$3"
            local src_d dest_d="" out rc
            src_d="$(aws ecr describe-images --repository-name "$repo" --image-ids imageTag="$from" --query 'imageDetails[0].imageDigest' --output text | tr -d '[:space:]')"
            dest_d="$(aws ecr describe-images --repository-name "$repo" --image-ids imageTag="$to" --query 'imageDetails[0].imageDigest' --output text 2>/dev/null | tr -d '[:space:]')" || true
            if [[ -n "${dest_d}" && "${dest_d}" == "${src_d}" ]]; then
              echo "${repo}: ${to} already matches ${from}, skipping put-image"
              return 0
            fi
            aws ecr batch-get-image --repository-name "$repo" --image-ids imageTag="$from" --query 'images[0].imageManifest' --output text > manifest.json
            set +e
            out="$(aws ecr put-image --repository-name "$repo" --image-tag "$to" --image-manifest file://manifest.json 2>&1)"
            rc=$?
            set -e
            if [[ "${rc}" -eq 0 ]]; then
              return 0
            fi
            if echo "${out}" | grep -q 'ImageAlreadyExistsException'; then
              echo "${repo}: tag ${to} already points at this digest (idempotent), ok"
              return 0
            fi
            echo "${out}" >&2
            return "${rc}"
          }
          for repo in "${ECR_ITEMS_REPO}" "${ECR_OUTFITS_REPO}" "${ECR_SCHEDULE_REPO}" "${ECR_WEB_REPO}" "${ECR_MIGRATE_REPO}"; do
            ecr_promote "$repo" dev qa
          done
          for repo in "${ECR_ITEMS_REPO}" "${ECR_OUTFITS_REPO}" "${ECR_SCHEDULE_REPO}" "${ECR_WEB_REPO}" "${ECR_MIGRATE_REPO}"; do
            ecr_promote "$repo" qa uat
          done

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform init (uat)
        working-directory: infra/envs/uat
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=envs/uat/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: VPC duplicate guard (uat)
        working-directory: infra/envs/uat
        run: bash ../../scripts/terraform-vpc-guard.sh

      - name: EKS import guard (uat)
        working-directory: infra/envs/uat
        run: bash ../../scripts/terraform-eks-import-guard.sh

      # When using external hosted zone secret, stop managing any previously-created
      # duplicate zone in state so re-runs from partial applies don't fail on zone drift.
      - name: Route53 state rm (external hosted zone secret)
        working-directory: infra/envs/uat
        run: |
          set -euo pipefail
          if [[ -n "${TF_VAR_route53_hosted_zone_id:-}" ]]; then
            terraform state rm 'module.platform.aws_route53_zone.this[0]' 2>/dev/null || true
          fi

      - name: Terraform apply (uat)
        working-directory: infra/envs/uat
        run: |
          terraform apply -auto-approve \
            -target=module.network \
            -target=module.eks \
            -target=module.rds

          # Same as dev: burst for Phase 2; scale-down after smoke only.
          BASE_MIN=1
          BASE_DESIRED=3
          BASE_MAX=6
          BURST_DESIRED=6
          # Align with burst target (never use prod thresholds on UAT — max nodes here is BASE_MAX).
          READY_FLOOR="${BURST_DESIRED}"
          CLUSTER="${EXPECTED_CLUSTER_NAME}"
          NODEGROUP="${EXPECTED_CLUSTER_NAME}-default"
          AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" "${BASE_MIN}" "${BURST_DESIRED}" "${BASE_MAX}"
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${CLUSTER}"
          echo "Waiting for burst node count to be Ready before Phase 2..."
          for i in {1..30}; do
            ready_nodes="$(kubectl get nodes --no-headers 2>/dev/null | awk '$2=="Ready"{c++} END{print c+0}')"
            echo "Ready nodes: ${ready_nodes}/${BURST_DESIRED} (attempt ${i}/30)"
            if [[ "${ready_nodes}" -ge "${BURST_DESIRED}" ]]; then
              break
            fi
            sleep 10
          done
          # Guardrail: do not continue into platform/observability reconcile if burst never materializes.
          ready_nodes="$(kubectl get nodes --no-headers 2>/dev/null | awk '$2=="Ready"{c++} END{print c+0}')"
          if [[ "${ready_nodes}" -lt "${READY_FLOOR}" ]]; then
            echo "UAT guardrail: Ready nodes (${ready_nodes}) below floor (${READY_FLOOR}). Re-applying burst and waiting once more..." >&2
            AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" "${BASE_MIN}" "${BURST_DESIRED}" "${BASE_MAX}" || true
            for i in {1..24}; do
              ready_nodes="$(kubectl get nodes --no-headers 2>/dev/null | awk '$2=="Ready"{c++} END{print c+0}')"
              echo "Ready nodes after retry: ${ready_nodes}/${BURST_DESIRED} (attempt ${i}/24)"
              if [[ "${ready_nodes}" -ge "${READY_FLOOR}" ]]; then
                break
              fi
              sleep 10
            done
            ready_nodes="$(kubectl get nodes --no-headers 2>/dev/null | awk '$2=="Ready"{c++} END{print c+0}')"
            if [[ "${ready_nodes}" -lt "${READY_FLOOR}" ]]; then
              echo "UAT guardrail failed: only ${ready_nodes} Ready nodes (need ${READY_FLOOR}); aborting before Helm reconcile." >&2
              exit 1
            fi
          fi
          kubectl get nodes --no-headers 2>/dev/null | awk '$2 ~ /SchedulingDisabled/ {print $1}' | xargs -r kubectl uncordon || true

          K8S_APP_NAMESPACE=uat bash ../../scripts/terraform-k8s-import-guard.sh
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" bash ../../scripts/helm-platform-reconcile.sh
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" bash ../../scripts/helm-monitoring-reconcile.sh
          terraform apply -auto-approve
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" DOMAIN_ROOT=claiset.xyz K8S_APP_NAMESPACE=uat FRONTEND_SUBDOMAIN=app-uat UPDATE_APEX_DNS=false bash ../../scripts/route53-ingress-records-guard.sh

      - name: Wait for readiness (uat)
        working-directory: infra/envs/uat
        run: |
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" K8S_APP_NAMESPACE=uat FRONTEND_HOST=app-uat.claiset.xyz EXPECT_OBSERVABILITY_SMOKE="${TF_VAR_enable_observability_stack:-false}" EXPECT_APP_OAUTH_SMOKE=true GRAFANA_HOST=grafana-uat.claiset.xyz bash ../../scripts/smoke-test-env.sh --wait-only

      - name: Smoke checks (uat)
        working-directory: infra/envs/uat
        run: |
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" K8S_APP_NAMESPACE=uat FRONTEND_HOST=app-uat.claiset.xyz EXPECT_OBSERVABILITY_SMOKE="${TF_VAR_enable_observability_stack:-false}" EXPECT_APP_OAUTH_SMOKE=true GRAFANA_HOST=grafana-uat.claiset.xyz bash ../../scripts/smoke-test-env.sh --skip-wait

      - name: Scale uat nodegroup down (post-smoke)
        if: always() && env.SCALE_DOWN_NODEGROUP_AFTER_SMOKE == 'true'
        working-directory: infra/envs/uat
        run: |
          CLUSTER="${EXPECTED_CLUSTER_NAME}"
          NODEGROUP="${EXPECTED_CLUSTER_NAME}-default"
          AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" 2 4 6

  prod:
    name: Promote to production (tags)
    env:
      EXPECTED_VPC_NAME: claiset-prod
      EXPECTED_CLUSTER_NAME: claiset-prod
      # ALB SPA canary (repo Variables): ALB_CANARY_PROD_ENABLED=true to turn on; ALB_CANARY_PROD_TRAFFIC_PERCENT (1–50), ALB_CANARY_PROD_WEB_REPLICAS (0–5).
      TF_VAR_enable_alb_weighted_canary_for_web: ${{ vars.ALB_CANARY_PROD_ENABLED == 'true' && 'true' || 'false' }}
      TF_VAR_alb_web_canary_traffic_percent: ${{ vars.ALB_CANARY_PROD_TRAFFIC_PERCENT != '' && vars.ALB_CANARY_PROD_TRAFFIC_PERCENT || '0' }}
      TF_VAR_web_canary_replicas: ${{ vars.ALB_CANARY_PROD_WEB_REPLICAS != '' && vars.ALB_CANARY_PROD_WEB_REPLICAS || '0' }}
    runs-on: ubuntu-latest
    concurrency:
      group: tf-prod-${{ github.repository }}
      cancel-in-progress: false
    # Syllabus: release tags promote prod — matches `on.push.tags [v*]` plus manual dispatch.
    if: ${{ vars.ALLOW_COSTLY_RUNS == 'true' && ((github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Observability OAuth preflight (prod)
        run: |
          set -euo pipefail
          if [[ "${TF_VAR_enable_observability_stack:-false}" == "true" ]]; then
            id_trimmed="$(printf '%s' "${TF_VAR_grafana_google_client_id:-}" | tr -d '[:space:]')"
            secret_trimmed="$(printf '%s' "${TF_VAR_grafana_google_client_secret:-}" | tr -d '[:space:]')"
            if [[ -z "${id_trimmed}" || -z "${secret_trimmed}" ]]; then
              echo "Observability enabled but Grafana Google OAuth secrets are empty." >&2
              echo "Set repository secrets GRAFANA_GOOGLE_CLIENT_ID and GRAFANA_GOOGLE_CLIENT_SECRET." >&2
              exit 1
            fi
            echo "::add-mask::${TF_VAR_grafana_google_client_secret}"
            echo "Observability OAuth preflight OK (prod)."
          else
            echo "Observability disabled; skipping OAuth preflight."
          fi

      - name: Set ECR registry from AWS account
        run: |
          acct="$(aws sts get-caller-identity --query Account --output text)"
          echo "ECR_REGISTRY=${acct}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "${GITHUB_ENV}"
          echo "Using ECR registry ${acct}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      # Ensure full chain so :uat exists even if UAT/QA jobs did not run before this tag push.
      - name: Retag ECR images dev → qa → uat → prod
        run: |
          set -euo pipefail
          ecr_promote() {
            local repo="$1" from="$2" to="$3"
            local src_d dest_d="" out rc
            src_d="$(aws ecr describe-images --repository-name "$repo" --image-ids imageTag="$from" --query 'imageDetails[0].imageDigest' --output text | tr -d '[:space:]')"
            dest_d="$(aws ecr describe-images --repository-name "$repo" --image-ids imageTag="$to" --query 'imageDetails[0].imageDigest' --output text 2>/dev/null | tr -d '[:space:]')" || true
            if [[ -n "${dest_d}" && "${dest_d}" == "${src_d}" ]]; then
              echo "${repo}: ${to} already matches ${from}, skipping put-image"
              return 0
            fi
            aws ecr batch-get-image --repository-name "$repo" --image-ids imageTag="$from" --query 'images[0].imageManifest' --output text > manifest.json
            set +e
            out="$(aws ecr put-image --repository-name "$repo" --image-tag "$to" --image-manifest file://manifest.json 2>&1)"
            rc=$?
            set -e
            if [[ "${rc}" -eq 0 ]]; then
              return 0
            fi
            if echo "${out}" | grep -q 'ImageAlreadyExistsException'; then
              echo "${repo}: tag ${to} already points at this digest (idempotent), ok"
              return 0
            fi
            echo "${out}" >&2
            return "${rc}"
          }
          for repo in "${ECR_ITEMS_REPO}" "${ECR_OUTFITS_REPO}" "${ECR_SCHEDULE_REPO}" "${ECR_WEB_REPO}" "${ECR_MIGRATE_REPO}"; do
            ecr_promote "$repo" dev qa
            ecr_promote "$repo" qa uat
            ecr_promote "$repo" uat prod
          done

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform init (prod)
        working-directory: infra/envs/prod
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=envs/prod/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: VPC duplicate guard (prod)
        working-directory: infra/envs/prod
        run: bash ../../scripts/terraform-vpc-guard.sh

      - name: EKS import guard (prod)
        working-directory: infra/envs/prod
        run: bash ../../scripts/terraform-eks-import-guard.sh

      # When using external hosted zone secret, stop managing any previously-created
      # duplicate zone in state so re-runs from partial applies don't fail on zone drift.
      - name: Route53 state rm (external hosted zone secret)
        working-directory: infra/envs/prod
        run: |
          set -euo pipefail
          if [[ -n "${TF_VAR_route53_hosted_zone_id:-}" ]]; then
            terraform state rm 'module.platform.aws_route53_zone.this[0]' 2>/dev/null || true
          fi

      - name: Terraform apply (prod)
        working-directory: infra/envs/prod
        run: |
          # When both proof modes are enabled, micro nodes often cannot host app + both DS collectors.
          # Switch to t3.small and use a lower node count for better pod density at lower cost.
          if [[ "${PROOF_NODE_EXPORTER}" == "true" && "${PROOF_LOKI_LOGS}" == "true" ]]; then
            export TF_VAR_node_instance_types='["t3.small"]'
            echo "Both proof toggles enabled -> using node types: ${TF_VAR_node_instance_types}"
          else
            export TF_VAR_node_instance_types='["t3.micro","t2.micro"]'
            echo "Single/no proof toggle -> using default free-tier node types: ${TF_VAR_node_instance_types}"
          fi

          terraform apply -auto-approve \
            -target=module.network \
            -target=module.eks \
            -target=module.rds

          # Guardrail: keep prod nodegroup fixed high through apply+smoke to avoid repeated
          # pod-density churn while observability and app pods converge.
          # Keep prior stable baseline for micro runs; use cost-effective t3.small profile when both proofs are enabled.
          if [[ "${PROOF_NODE_EXPORTER}" == "true" && "${PROOF_LOKI_LOGS}" == "true" ]]; then
            BASE_MIN=8
            BASE_DESIRED=8
            BASE_MAX=10
            BURST_DESIRED=8
            READY_FLOOR=7
          else
            BASE_MIN=16
            BASE_DESIRED=16
            BASE_MAX=16
            BURST_DESIRED=16
            READY_FLOOR=14
          fi
          CLUSTER="${EXPECTED_CLUSTER_NAME}"
          NODEGROUP="${EXPECTED_CLUSTER_NAME}-default"
          # Raise pod density on micro nodes before scheduling observability + app pods.
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-enable-prefix-delegation.sh
          AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" "${BASE_MIN}" "${BURST_DESIRED}" "${BASE_MAX}"
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${CLUSTER}"
          echo "Waiting for burst node count to be Ready before Phase 2..."
          for i in {1..30}; do
            ready_nodes="$(kubectl get nodes --no-headers 2>/dev/null | awk '$2=="Ready"{c++} END{print c+0}')"
            echo "Ready nodes: ${ready_nodes}/${BURST_DESIRED} (attempt ${i}/30)"
            if [[ "${ready_nodes}" -ge "${BURST_DESIRED}" ]]; then
              break
            fi
            sleep 10
          done
          # Guardrail: keep a high-enough floor before rollout/smoke tests.
          ready_nodes="$(kubectl get nodes --no-headers 2>/dev/null | awk '$2=="Ready"{c++} END{print c+0}')"
          if [[ "${ready_nodes}" -lt "${READY_FLOOR}" ]]; then
            echo "Prod guardrail failed post-apply: only ${ready_nodes} Ready nodes; aborting before readiness/smoke." >&2
            exit 1
          fi
          kubectl get nodes --no-headers 2>/dev/null | awk '$2 ~ /SchedulingDisabled/ {print $1}' | xargs -r kubectl uncordon || true

          K8S_APP_NAMESPACE=prod bash ../../scripts/terraform-k8s-import-guard.sh
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" bash ../../scripts/helm-platform-reconcile.sh
          PROD_MON_BURST_MIN_SIZE="${BASE_MIN}" PROD_MON_BURST_DESIRED_SIZE="${BURST_DESIRED}" PROD_MON_BURST_MAX_SIZE="${BASE_MAX}" EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" bash ../../scripts/helm-monitoring-reconcile.sh
          terraform apply -auto-approve
          # Second full apply can reset nodegroup desired_size to Terraform defaults.
          # Re-burst before readiness checks so rollout/smoke do not run on an under-capacity cluster.
          AWS_REGION="${AWS_REGION}" bash ../../scripts/eks-burst-scale.sh "${CLUSTER}" "${NODEGROUP}" "${BASE_MIN}" "${BURST_DESIRED}" "${BASE_MAX}"
          K8S_NAMESPACES="prod monitoring platform kube-system" bash ../../scripts/k8s-gc-pods.sh
          echo "Waiting for post-apply burst node count to be Ready..."
          for i in {1..30}; do
            ready_nodes="$(kubectl get nodes --no-headers 2>/dev/null | awk '$2=="Ready"{c++} END{print c+0}')"
            echo "Ready nodes: ${ready_nodes}/${BURST_DESIRED} (attempt ${i}/30)"
            if [[ "${ready_nodes}" -ge "${BURST_DESIRED}" ]]; then
              break
            fi
            sleep 10
          done
          kubectl get nodes --no-headers 2>/dev/null | awk '$2 ~ /SchedulingDisabled/ {print $1}' | xargs -r kubectl uncordon || true
          EXPECTED_CLUSTER_NAME="${EXPECTED_CLUSTER_NAME}" DOMAIN_ROOT=claiset.xyz K8S_APP_NAMESPACE=prod FRONTEND_SUBDOMAIN=app-prod UPDATE_APEX_DNS=true bash ../../scripts/route53-ingress-records-guard.sh

      - name: Wait for readiness (prod)
        working-directory: infra/envs/prod
        run: |
          if [[ "${PROOF_NODE_EXPORTER}" == "true" && "${PROOF_LOKI_LOGS}" == "true" ]]; then
            REC_MIN=8; REC_DESIRED=8; REC_MAX=10; REC_FLOOR=7
          else
            REC_MIN=16; REC_DESIRED=16; REC_MAX=16; REC_FLOOR=14
          fi
